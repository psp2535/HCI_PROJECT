services:
  # Frontend React App
  - type: web
    name: abviiitm-frontend
    runtime: static
    plan: free
    buildCommand: npm run build
    staticPublishPath: dist
    rootDirectory: client
    envVars:
      - key: VITE_API_URL
        value: https://abviiitm-backend.onrender.com
    autoDeploy: true
